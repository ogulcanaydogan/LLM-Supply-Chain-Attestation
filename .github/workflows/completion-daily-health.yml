name: completion-daily-health

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run daily completion checks
        env:
          GH_TOKEN: ${{ github.token }}
          BOOTSTRAP_FRESH_ARTIFACTS: "true"
        run: |
          chmod +x scripts/completion-daily-check.sh
          ./scripts/completion-daily-check.sh "${GITHUB_REPOSITORY}"

      - name: Upload completion health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: completion-daily-health
          path: .llmsa/public-footprint/**
